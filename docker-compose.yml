services:
  postgres:
    image: postgres:16
    container_name: erp-postgres
    environment:
      POSTGRES_DB: ${ERP_DB_NAME:-erp}
      POSTGRES_USER: ${ERP_DB_USER:-erp}
      POSTGRES_PASSWORD: ${ERP_DB_PASSWORD:?Set ERP_DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ERP_DB_USER:-erp} -d ${ERP_DB_NAME:-erp}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
